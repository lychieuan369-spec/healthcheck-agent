name: Railway Usage Alert

on:
  schedule:
    - cron: '0 */6 * * *'  # mỗi 6 tiếng
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check Railway usage
        run: python railway_usage_alert.py
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          THRESHOLD_USD: "5"

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add railway_usage_state.json
          git diff --cached --quiet || git commit -m "chore: update railway_usage_state.json [skip ci]"
          git push
